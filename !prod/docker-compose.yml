# Production stack for the frontend. Unlike a dev setup, this never builds: the
# image is built + pushed separately (build.sh at the repo root) and pulled here
# by tag — the server only pulls. Pin/roll back via FRONTEND_TAG in .env.
#
# SSR Node server on :3000. It publishes no host ports; instead it registers with
# the shared edge (nginx-proxy + acme-companion on the external ingress_proxy
# network, already running for the backend on this host) as a virtual host, and
# the edge terminates TLS and forwards here. Public NEXT_PUBLIC_* config is baked
# into the image at build time; only server-side runtime config lives here.
services:
  frontend:
    image: registry.cpapony.com/frontend24:${FRONTEND_TAG:-latest}
    restart: always
    env_file: [.env]
    environment:
      NODE_ENV: production
      # Server → backend API base for SSR fetches (read per-request).
      API_INTERNAL_URL: ${API_INTERNAL_URL:?set API_INTERNAL_URL in .env}
      # SSRF allow-list for the /media proxy. Normally empty in prod (signed
      # storage URLs are public); set host[:port] CSV only for private storage.
      MEDIA_INTERNAL_HOSTS: ${MEDIA_INTERNAL_HOSTS:-}
      # Edge registration (nginx-proxy auto-discovers these on ingress_proxy).
      VIRTUAL_HOST: ${DOMAIN:?set DOMAIN in .env}
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    expose: ["3000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [ingress_proxy]

networks:
  ingress_proxy:
    external: true
    name: ingress_proxy
